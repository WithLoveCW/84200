<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<style>
	@font-face {
  font-family: 'JulesColossal';

* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
   background: #1c1c1c;

}

body {

}

.app {

  max-width: calc(100vh * (1080 / 1920));
  aspect-ratio: 1080 / 1920;
  width: 100%;

  overflow: hidden;

}

.screen {
  position: absolute;
  inset: 0;
  display: none;
  overflow: hidden;
}

.screen.active {
  display: block;
}

.bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.name {
  position: absolute;
  width: 100%;
  text-align: center;
 color: #e3bb95;
font-size: clamp(36px, 5.4vh, 64px);
  line-height: 1;
  z-index: 5;
}
	.page3-text {
  position: absolute;
  top: 12%;
  width: 100%;
  text-align: center;
  z-index: 5;
  color: #e3bb95;
}

.page3-name {
  font-size: clamp(46px, 6.4vh, 78px);
  line-height: 1;
}

.page3-subtitle {
  margin-top: 12px;
  font-size: clamp(14px, 2vh, 26px);
  letter-spacing: 5px;
}

/* Page 1 */
#namePage1 {
  top: 10%;
}

.tap-zone {
  position: absolute;
  left: 27%;
  top: 47%;
  width: 46%;
  height: 24%;
  z-index: 10;
  cursor: pointer;
}

/* Page 2 */
.photo-wrap {
  position: absolute;
  left: 50%;
  top: 17%;
  width: 66%;
  height: 40%;
  transform: translateX(-50%);
  z-index: 5;
  overflow: hidden;
  border-radius: 28px;
  background: transparent;
  padding: 0;
  border: none;
  box-shadow: none;
}

	#friendPhoto {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  display: block;
  border-radius: 28px;
}
	

	.photo-corner {
  position: absolute;
  width: 24%;
  z-index: 10;
  pointer-events: none;
}

.top-left {
  top: -2%;
  left: -2%;
}

.bottom-right {
  bottom: -2%;
  right: -2%;
}
	
.scratch-back {
  z-index: 1;
  opacity: 0;
}

#scratchCanvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 2;
  display: block;
}
	
.reveal-text {
  position: absolute;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  color: #4b342b;
  font-size: clamp(28px, 4vh, 48px);
  font-weight: bold;
  z-index: 6;
  pointer-events: none;
}

.button-zone {
  position: absolute;
  left: 23%;
  bottom: 10%;
  width: 54%;
  height: 8%;
  z-index: 999;
  cursor: pointer;
  background: transparent;
}

.celebrate-zone {
  position: absolute;
  left: 16%;
  top: 70%;
  width: 68%;
  height: 13%;
  z-index: 9999;
  cursor: pointer;
  background: transparent;
  display: none;
}

.continue-zone {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 34%;
  z-index: 999;
  cursor: pointer;
}
</style>
</head>
	

<body>
<div class="app">

  <!-- PAGE 1 -->

  </section>

  <!-- PAGE 2 -->

    <img class="bg" src="./images/Page2.jpeg" alt="">

 <div class="photo-wrap">
  <img id="friendPhoto" src="./images/image-placeholder.jpeg" alt="">

 
</div>

  <div class="continue-zone" onclick="goToPage(3)"></div>
  </section>

<section class="screen" id="page3">
  <img class="bg scratch-back" src="./images/Page4.jpeg" alt="">

  <div class="page3-text">
    <div class="page3-name" id="page3Name"></div>
  </div>

  <canvas id="scratchCanvas"></canvas>
  <div class="celebrate-zone" onclick="bigConfetti()"></div>
</section>
	
<section class="screen" id="page4">
  <img class="bg" src="./images/Page4.jpeg" alt="">
  <div class="button-zone" onclick="bigConfetti()"></div>
</section>
</div>
<audio id="winSound" preload="auto">
  <source src="./sounds/win.mp3" type="audio/mpeg">
</audio>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script>
const SUPABASE_URL = "https://bfzhvulpymbqzwxorzih.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_aLj5jota1g3icfvF7MROIQ_b4-yKlo3";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let scratchedEnough = false;

function goToPage(pageNumber) {
  document.querySelectorAll(".screen").forEach(screen => {
    screen.classList.remove("active");
  });

  document.getElementById(`page${pageNumber}`).classList.add("active");

  if (pageNumber === 3) {
    setTimeout(setupScratch, 100);
  }
}

async function loadDetails() {
  const params = new URLSearchParams(window.location.search);
  const revealId = params.get("id");

  if (!revealId) return;

  const { data, error } = await supabaseClient
    .from("bridesmaid-design1")
    .select("*")
    .eq("id", revealId)
    .single();

  if (error || !data) {
    console.error("Details load error:", error);
    return;
  }

  const friendName = data.friend_name || "Charlotte";
  const role = data.role || "BRIDESMAID?";

  document.getElementById("namePage1").textContent = `${friendName}...`;
	document.getElementById("page3Name").textContent =
  `${friendName},`;


 document.getElementById("friendPhoto").src =
  data.photo_url || "./images/image-placeholder.jpeg";
}

function setupScratch() {
  const canvas = document.getElementById("scratchCanvas");
  const ctx = canvas.getContext("2d");

	const app = document.querySelector(".app");
const rect = app.getBoundingClientRect();

  canvas.width = rect.width * window.devicePixelRatio;
  canvas.height = rect.height * window.devicePixelRatio;
  canvas.style.width = rect.width + "px";
  canvas.style.height = rect.height + "px";

  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

  const img = new Image();
  img.src = "./images/Page3.jpeg";

  img.onload = () => {
    ctx.drawImage(img, 0, 0, rect.width, rect.height);
    ctx.globalCompositeOperation = "destination-out";
	  canvas.style.background = "transparent";
	  document.querySelector(".scratch-back").style.opacity = "1";
  };

  let isDrawing = false;
	const heartArea = {
  left: rect.width * 0.11,
  top: rect.height * 0.29,
  width: rect.width * 0.78,
  height: rect.height * 0.40
};

const scratchedCells = new Set();
const cellSize = 18;
const totalCells =
  Math.floor(heartArea.width / cellSize) *
  Math.floor(heartArea.height / cellSize);

 function scratch(e) {

    const touch = e.touches ? e.touches[0] : e;
    const canvasRect = canvas.getBoundingClientRect();

    const x = touch.clientX - canvasRect.left;
    const y = touch.clientY - canvasRect.top;
	 if (!isDrawing) return;
	
	  


    ctx.beginPath();
    ctx.arc(x, y, 17, 0, Math.PI * 2);
    ctx.fill();

 checkScratchAmount(x, y, heartArea, scratchedCells, cellSize, totalCells);
  }

  canvas.onmousedown = () => isDrawing = true;
  canvas.onmouseup = () => isDrawing = false;
  canvas.onmouseleave = () => isDrawing = false;
  canvas.onmousemove = scratch;

  canvas.ontouchstart = (e) => {
    isDrawing = true;
    scratch(e);
  };

  canvas.ontouchend = () => isDrawing = false;

  canvas.ontouchmove = (e) => {
    e.preventDefault();
    scratch(e);
  };
}


function checkScratchAmount(x, y, heartArea, scratchedCells, cellSize, totalCells) {
  if (scratchedEnough) return;

  const insideHeart =
    x >= heartArea.left &&
    x <= heartArea.left + heartArea.width &&
    y >= heartArea.top &&
    y <= heartArea.top + heartArea.height;

  if (!insideHeart) return;

  const cellX = Math.floor((x - heartArea.left) / cellSize);
  const cellY = Math.floor((y - heartArea.top) / cellSize);

  scratchedCells.add(`${cellX}-${cellY}`);

  const percent = scratchedCells.size / totalCells;

if (percent > 0.29) {
  scratchedEnough = true;
  fireConfetti();
  document.querySelector(".celebrate-zone").style.display = "block";
}
}
function fireConfetti() {
	const sound = document.getElementById("winSound");
sound.currentTime = 0;
sound.play();
  confetti({
    particleCount: 180,
    spread: 85,
    origin: { y: 0.6 },
    colors: [
      "#D4AF37", // Metallic Gold
  "#FFD700", // Bright Gold highlight
  "#B87333", // Bronze
  "#8C6239", // Dark Bronze
  "#3A3A3A", // Dark Grey
  "#1C1C1C", // Charcoal
  "#000000"  // Black
]
  });
}

function bigConfetti() {

  const sound = document.getElementById("winSound");
  sound.currentTime = 0;
  sound.play();

  // First burst
  confetti({
    particleCount: 220,
    spread: 110,
    origin: { y: 0.65 },
    colors: [
     "#D4AF37", // Metallic Gold
  "#FFD700", // Bright Gold highlight
  "#B87333", // Bronze
  "#8C6239", // Dark Bronze
  "#3A3A3A", // Dark Grey
  "#1C1C1C", // Charcoal
  "#000000"  // Black
    ]
  });

  // Side bursts
  setTimeout(() => {
    confetti({
      particleCount: 180,
      spread: 120,
      origin: { x: 0.2, y: 0.65 },
      colors: [
       "#D4AF37", // Metallic Gold
  "#FFD700", // Bright Gold highlight
  "#B87333", // Bronze
  "#8C6239", // Dark Bronze
  "#3A3A3A", // Dark Grey
  "#1C1C1C", // Charcoal
  "#000000"  // Black
      ]
    });

    confetti({
      particleCount: 180,
      spread: 120,
      origin: { x: 0.8, y: 0.65 },
		scalar: 1.2,
  ticks: 300,
      colors: [
      "#D4AF37", // Metallic Gold
  "#FFD700", // Bright Gold highlight
  "#B87333", // Bronze
  "#8C6239", // Dark Bronze
  "#3A3A3A", // Dark Grey
  "#1C1C1C", // Charcoal
  "#000000"  // Black
      ]
    });
  }, 300);

  // SECOND BIG BURST (2 seconds later)
  setTimeout(() => {
    confetti({
      particleCount: 280,
		scalar: 1.2,
  ticks: 300,
      spread: 140,
      origin: { y: 0.55 },
      colors: [
         "#D4AF37", // Metallic Gold
  "#FFD700", // Bright Gold highlight
  "#B87333", // Bronze
  "#8C6239", // Dark Bronze
  "#3A3A3A", // Dark Grey
  "#1C1C1C", // Charcoal
  "#000000"  // Black
      ]
    });
  }, 2000);
}

	loadDetails();
</script>
</body>
</html>
